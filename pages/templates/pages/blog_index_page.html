{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<h1>{{ page.title }}</h1>
<ul>
  {% for post in blog_posts %}
    <li><a href="{% pageurl post %}">{{ post.title }}</a></li>
  {% endfor %}
</ul>
{% endblock %}

<!-- Show the drawer's name as a heading. Then look inside the drawer, grab every sheet of paper (post) that's published (live) and turn each one back into its real form (specific — a BlogPage, not a generic blank Page). List each one's title as a clickable link -->
