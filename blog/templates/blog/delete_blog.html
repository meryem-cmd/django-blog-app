{% extends "base.html" %}

{% block title %}
Delete Blog
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow border-danger">

<div class="card-body text-center">

<h2 class="text-danger">

Delete Blog

</h2>

<p class="my-4">

Are you sure you want to delete

<strong>

"{{ post.title }}"

</strong>

?

</p>

<form method="POST">

{% csrf_token %}

<button class="btn btn-danger">

Yes, Delete

</button>

<a href="{% url 'blog_detail' post.pk %}" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
