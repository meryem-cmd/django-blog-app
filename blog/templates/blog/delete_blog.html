{% extends "base.html" %}

{% block title %}
Delete Blog
{% endblock %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card">
<div class="card-body p-5 text-center">

    <h2 class="mb-3" style="color: var(--danger);">Delete Blog</h2>

    <p class="mb-4">
        Are you sure you want to delete <strong>"{{ post.title }}"</strong>?
        This can't be undone.
    </p>

    <form method="POST" class="d-flex justify-content-center gap-2">
        {% csrf_token %}
        <button class="btn btn-danger">
            Yes, Delete
        </button>
        <a href="{% url 'blog_detail' post.pk %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>
</div>

</div>
</div>

{% endblock %}
