{% extends "base.html" %}

{% block title %}
Create Blog
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">

Create New Blog

</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-success">

Publish

</button>

<a href="{% url 'home' %}" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
