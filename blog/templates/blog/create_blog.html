{% extends "base.html" %}

{% block title %}
{% if editing %}Edit Blog{% else %}Create Blog{% endif %}
{% endblock %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-8">

<div class="card">
<div class="card-body p-5">

    <h2 class="mb-4">
        {% if editing %}Edit Blog{% else %}Create New Blog{% endif %}
    </h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-success">
                {% if editing %}Save Changes{% else %}Publish{% endif %}
            </button>

            <a href="{% url 'home' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>

</div>
</div>

</div>
</div>

{% endblock %}
